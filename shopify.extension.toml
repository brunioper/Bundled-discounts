# FILE: extensions/bundle-discount/shopify.extension.toml
# Do not edit this file unless renaming the extension.

api_version = "2024-04"

[[extensions]]
type        = "function"
name        = "Bundle Discount — 4 for $299"
handle      = "bundle-discount"
description = "Automatic cart discount: any 4 items from target collection = $299. Stacks for multiples."

[extensions.build]
command = "npm run build"

[extensions.ui]
enable_create = true
