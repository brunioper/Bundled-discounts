query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            inAnyCollection: collections(first: 20) {
              id
            }
          }
        }
      }
    }
  }
}
