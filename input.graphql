# FILE: extensions/bundle-discount/input.graphql
# Tells Shopify what cart data to inject into the function.
# Do not edit this file.

query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            inAnyCollection: collections(first: 20) {
              id
            }
          }
        }
      }
    }
  }
}
